workflows:

  # ============================================
  # Clarity iOS — Build & Deploy to TestFlight
  # ============================================
  clarity-ios:
    name: Clarity iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: App Store Connect

    environment:
      vars:
        XCODE_SCHEME: "Clarity"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # Step 1: Install XcodeGen
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      # Step 2: Run setup (download fonts + generate xcodeproj)
      - name: Run setup
        script: |
          cd Clarity-iOS
          chmod +x setup.sh
          ./setup.sh

      # Step 3: Set up code signing
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.clarity-focus" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.ShieldConfiguration" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.ShieldAction" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.DeviceActivityMonitor" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.DeviceActivityReport" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.Widget" --type IOS_APP_STORE --create
          keychain add-certificates

          # Debug: verify profiles were downloaded and check their capabilities
          echo "=== Installed Provisioning Profiles ==="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if [ -d "$PROFILE_DIR" ]; then
            for f in "$PROFILE_DIR"/*.mobileprovision; do
              [ -f "$f" ] || continue
              echo "--- $(basename "$f") ---"
              security cms -D -i "$f" 2>/dev/null | plutil -extract Name raw - 2>/dev/null || true
              echo "  Entitlements:"
              security cms -D -i "$f" 2>/dev/null | plutil -extract Entitlements xml1 -o - - 2>/dev/null | head -30 || true
              echo ""
            done
          else
            echo "WARNING: No provisioning profiles directory found!"
          fi
          echo "======================================="

          cd Clarity-iOS
          xcode-project use-profiles --project Clarity.xcodeproj

      # Step 4: Build IPA for distribution
      - name: Build IPA
        script: |
          cd Clarity-iOS
          xcode-project build-ipa \
            --project Clarity.xcodeproj \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - Clarity-iOS/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Clarity Testers
