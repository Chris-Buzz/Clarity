workflows:

  # ============================================
  # Clarity iOS — Build & Deploy to TestFlight
  # ============================================
  clarity-ios:
    name: Clarity iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: App Store Connect

    environment:
      vars:
        XCODE_SCHEME: "Clarity"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # Step 1: Install XcodeGen
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      # Step 2: Run setup (download fonts + generate xcodeproj)
      - name: Run setup
        script: |
          cd Clarity-iOS
          chmod +x setup.sh
          ./setup.sh

      # Step 3: Fetch certificates
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.clarity-focus" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.ShieldConfiguration" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.ShieldAction" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.DeviceActivityMonitor" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.DeviceActivityReport" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "com.clarity-focus.Widget" --type IOS_APP_STORE --create
          keychain add-certificates

      # Step 4: Build archive + export IPA using automatic signing
      # Bypasses xcode-project use-profiles/build-ipa which fails with XcodeGen projects.
      # Instead, -allowProvisioningUpdates lets Xcode manage profiles directly via the
      # App Store Connect API key (same mechanism as Xcode.app automatic signing).
      - name: Build IPA
        script: |
          cd Clarity-iOS

          # Extract team ID from a downloaded provisioning profile
          TEAM_ID=""
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            [ -f "$f" ] || continue
            TEAM_ID=$(security cms -D -i "$f" 2>/dev/null | plutil -extract TeamIdentifier.0 raw - 2>/dev/null)
            [ -n "$TEAM_ID" ] && break
          done

          if [ -z "$TEAM_ID" ]; then
            echo "ERROR: Could not extract Team ID from provisioning profiles"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles directory"
            exit 1
          fi
          echo "Using Team ID: $TEAM_ID"

          # Archive with automatic signing + ASC API key auth
          xcodebuild archive \
            -project Clarity.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/Clarity.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_PRIVATE_KEY" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Export IPA for App Store distribution
          xcodebuild -exportArchive \
            -archivePath build/Clarity.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_PRIVATE_KEY" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - Clarity-iOS/build/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Clarity Testers
