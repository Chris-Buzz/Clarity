workflows:

  # ============================================
  # Clarity iOS — Build & Deploy to TestFlight
  # ============================================
  clarity-ios:
    name: Clarity iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: App Store Connect

    environment:
      vars:
        XCODE_SCHEME: "Clarity"
        TEAM_ID: "3662MQ5JFC"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # Step 1: Install XcodeGen
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      # Step 2: Run setup (download fonts + generate xcodeproj)
      - name: Run setup
        script: |
          cd Clarity-iOS
          chmod +x setup.sh
          ./setup.sh

      # Step 3: Prepare keychain for xcodebuild
      - name: Set up keychain
        script: |
          keychain initialize

      # Step 4: Build + sign + export IPA
      # xcodebuild -allowProvisioningUpdates with API key auth handles ALL signing:
      # creates certificates, creates/downloads profiles, and signs automatically.
      # No Codemagic CLI signing tools needed (fetch-signing-files, use-profiles, etc.)
      - name: Build IPA
        script: |
          cd Clarity-iOS

          # Write API key content to a file (xcodebuild needs a file path, not content)
          API_KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$API_KEY_PATH"

          xcodebuild archive \
            -project Clarity.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/Clarity.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild -exportArchive \
            -archivePath build/Clarity.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - Clarity-iOS/build/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Clarity Testers
